<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能药盒 App · 交互原型</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: { 50: '#FDFBF7', 100: '#FAF6EE', 200: '#F3EBDD' },
            amber2: { 400: '#F0A868', 500: '#E8924A', 600: '#D97D38' },
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#EFE7DA; }
    @keyframes popIn { 0% { transform: scale(0); opacity:0 } 60% { transform: scale(1.15); opacity:1 } 100% { transform: scale(1); opacity:1 } }
    @keyframes draw { from { stroke-dashoffset: 60 } to { stroke-dashoffset: 0 } }
    @keyframes ripple { 0% { transform: scale(0); opacity:0.5 } 100% { transform: scale(2); opacity:0 } }
    .anim-pop { animation: popIn 400ms ease-out forwards; }
    .anim-draw { stroke-dasharray: 60; animation: draw 350ms ease-out forwards; }
    .anim-ripple { animation: ripple 600ms ease-out; }
    @keyframes pulseSoft { 0%,100% { transform: scale(1) } 50% { transform: scale(1.05) } }
    .anim-pulse { animation: pulseSoft 1.6s ease-in-out infinite; }
    /* 撒花动效 */
    @keyframes confettiFall {
      0% { transform: translate(0,-20px) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--tx), 320px) rotate(var(--rot)); opacity: 0; }
    }
    .confetti-piece { position: absolute; width: 10px; height: 14px; border-radius: 2px; top: 0; animation: confettiFall 1.4s ease-in forwards; }
    @keyframes streakPop { 0% { transform: scale(1) } 30% { transform: scale(1.18) } 100% { transform: scale(1) } }
    .streak-num { animation: streakPop 1.2s ease-in-out 1; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ============ SVG 图标库 ============ */
    const Icon = ({ name, className = "w-6 h-6", stroke = 1.8 }) => {
      const paths = {
        home: <><path d="M3 10.5 12 3l9 7.5" /><path d="M5 9.5V21h14V9.5" /></>,
        heart: <path d="M12 21s-7-4.6-9.3-9C1.2 9 2.6 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.4 0 4.8 3.5 3.3 6.5C19 16.4 12 21 12 21Z" />,
        heartFill: <path d="M12 21s-7-4.6-9.3-9C1.2 9 2.6 5.5 6 5.5c2 0 3.2 1.2 4 2.3.8-1.1 2-2.3 4-2.3 3.4 0 4.8 3.5 3.3 6.5C19 16.4 12 21 12 21Z" />,
        pill: <><rect x="3" y="8" width="18" height="8" rx="4" /><path d="M12 8v8" /></>,
        phone: <path d="M5 4h3l2 5-2 1.5a11 11 0 0 0 5 5L16 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2Z" />,
        chart: <><path d="M4 19V5" /><path d="M4 19h16" /><path d="m7 14 3-4 3 2 4-6" /></>,
        list: <><path d="M8 6h13" /><path d="M8 12h13" /><path d="M8 18h13" /><circle cx="4" cy="6" r="0.8" /><circle cx="4" cy="12" r="0.8" /><circle cx="4" cy="18" r="0.8" /></>,
        gear: <><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" /></>,
        camera: <><path d="M4 8h3l1.5-2h7L17 8h3v11H4Z" /><circle cx="12" cy="13" r="3.5" /></>,
        edit: <><path d="M4 20h4L19 9l-4-4L4 16Z" /><path d="m14 6 4 4" /></>,
        check: <path d="m5 12 5 5L20 7" />,
        clock: <><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></>,
        bell: <><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6Z" /><path d="M10 20a2 2 0 0 0 4 0" /></>,
        plus: <><path d="M12 5v14M5 12h14" /></>,
        warn: <><path d="M12 3 2 20h20L12 3Z" /><path d="M12 10v4M12 17v.5" /></>,
        user: <><circle cx="12" cy="8" r="4" /><path d="M4 21c0-4 4-6 8-6s8 2 8 6" /></>,
        chevron: <path d="m9 6 6 6-6 6" />,
        chevronLeft: <path d="m15 6-6 6 6 6" />,
        flame: <path d="M12 3c1 4 4 5 4 9a4 4 0 0 1-8 0c0-2 1-3 1-5 1 1 1 2 3 1Z" />,
        thumbUp: <><path d="M7 11v9H4v-9Z" /><path d="M7 11h7l3-7c2 0 3 1 3 3l-2 5h2a2 2 0 0 1 0 4h-2l-1 4H7" /></>,
        cameraLg: <><path d="M4 8h3l1.5-2h7L17 8h3v11H4Z" /><circle cx="12" cy="13" r="3.5" /></>,
        sparkle: <><path d="M12 4v3M12 17v3M4 12h3M17 12h3M6 6l2 2M16 16l2 2M18 6l-2 2M8 16l-2 2" /></>,
        send: <><path d="M22 2 11 13" /><path d="M22 2 15 22l-4-9-9-4 20-7Z" /></>,
      };
      return (
        <svg viewBox="0 0 24 24" fill={name === 'heartFill' ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth={stroke}
          strokeLinecap="round" strokeLinejoin="round" className={className}>
          {paths[name]}
        </svg>
      );
    };

    const NavItem = ({ icon, label, active, activeColor, onClick }) => (
      <button onClick={onClick} className={`flex-1 py-3 flex flex-col items-center gap-0.5 cursor-pointer transition ${active ? activeColor : "text-stone-400 hover:text-stone-500"}`}>
        <Icon name={icon} className="w-6 h-6" />
        <span className={`text-xs ${active ? "font-bold" : ""}`}>{label}</span>
      </button>
    );

    /* 折线趋势图（支持多警戒线 + 标签） */
    const LineTrend = ({ data, lines, height = 130, warnLines = [], yMinForce, yMaxForce }) => {
      const all = data.flatMap(d => lines.map(l => d[l.key]));
      const wAll = warnLines.map(w => w.value);
      let max = Math.max(...all, ...wAll);
      let min = Math.min(...all, ...wAll);
      if (yMaxForce !== undefined) max = Math.max(max, yMaxForce);
      if (yMinForce !== undefined) min = Math.min(min, yMinForce);
      const range = (max - min) || 1;
      const pad = range * 0.2;
      const W = 320, H = height, L = 38, R = 12;
      const x = (i) => data.length <= 1 ? (W+L)/2 : (i / (data.length - 1)) * (W - L - R) + L;
      const y = (v) => H - 22 - ((v - min + pad) / (range + pad * 2)) * (H - 32);
      return (
        <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ height }}>
          {/* 警戒线 */}
          {warnLines.map((w, wi) => (
            <g key={wi}>
              <line x1={L} y1={y(w.value)} x2={W-R} y2={y(w.value)} stroke={w.color} strokeWidth="1" strokeDasharray="4 3" />
              <text x={L-4} y={y(w.value)+3} fontSize="9" fill={w.color} textAnchor="end" fontWeight="600">{w.value}</text>
              {w.label && <text x={W-R} y={y(w.value)-3} fontSize="8" fill={w.color} textAnchor="end">{w.label}</text>}
            </g>
          ))}
          {/* 折线 */}
          {lines.map((l, li) => {
            const pts = data.map((d, i) => `${x(i)},${y(d[l.key])}`).join(" ");
            return (
              <g key={li}>
                <polyline points={pts} fill="none" stroke={l.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                {data.map((d, i) => {
                  const isAbnormal = l.abnormalCheck ? l.abnormalCheck(d[l.key]) : false;
                  return <circle key={i} cx={x(i)} cy={y(d[l.key])} r={isAbnormal ? 3.5 : 2.5} fill={isAbnormal ? "#E11D48" : l.color} />;
                })}
              </g>
            );
          })}
          {/* X轴标签 */}
          {data.map((d, i) => (i % Math.ceil(data.length/6) === 0 || i === data.length-1) && (
            <text key={i} x={x(i)} y={H-6} fontSize="9" fill="#A8A29E" textAnchor="middle">{d.label}</text>
          ))}
        </svg>
      );
    };

    const Legend = ({ items }) => (
      <div className="flex gap-3 flex-wrap">
        {items.map((it, i) => (
          <div key={i} className="flex items-center gap-1">
            <span className="w-3 h-1 rounded-full" style={{ background: it.color }}></span>
            <span className="text-xs text-stone-500">{it.label}</span>
          </div>
        ))}
      </div>
    );

    /* 7天迷你执行轨迹 */
    const MiniHistory = ({ days }) => {
      const colorMap = { taken: "bg-amber2-500", missed: "bg-rose-400", pending: "bg-stone-300", none: "bg-stone-100" };
      return (
        <div className="flex gap-1">
          {days.map((d, i) => (
            <div key={i} title={`${d.label}: ${d.status}`} className={`w-4 h-4 rounded-sm ${colorMap[d.status]}`}></div>
          ))}
        </div>
      );
    };

    /* 服药"我吃了"按钮 - 含动效 */
    const TakeMedButton = ({ onTake, large }) => {
      const [animating, setAnimating] = useState(false);
      const [done, setDone] = useState(false);
      const handle = () => {
        setAnimating(true);
        setTimeout(() => { setDone(true); setTimeout(onTake, 350); }, 100);
      };
      const sizeCls = large ? "py-5 text-2xl" : "py-4 text-xl";
      return (
        <button onClick={handle} disabled={animating} className={`relative overflow-hidden w-full ${sizeCls} font-bold rounded-xl cursor-pointer transition flex items-center justify-center gap-2 ${done ? "bg-green-500 text-white" : "bg-amber2-500 hover:bg-amber2-600 text-white"}`}>
          {animating && <span className="absolute inset-0 bg-white/40 anim-ripple rounded-full"></span>}
          {done ? (
            <svg viewBox="0 0 24 24" className={large ? "w-9 h-9" : "w-7 h-7"} fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
              <path className="anim-draw" d="m5 12 5 5L20 7" />
            </svg>
          ) : (
            <Icon name="check" className={large ? "w-7 h-7" : "w-6 h-6"} stroke={2.5} />
          )}
          {done ? <span className="anim-pop inline-block">已记录</span> : <span>我吃了</span>}
        </button>
      );
    };

    // ==================== 老人端 ====================

    /* 下次服药卡片：含"我吃了"按钮 + 撒花动效（按时版本） */
    function NextDoseCard({ med, onTake }) {
      const [animating, setAnimating] = useState(false);
      const [done, setDone] = useState(false);
      const [confetti, setConfetti] = useState([]);
      const handle = () => {
        setAnimating(true);
        const colors = ["#E8924A", "#F0A868", "#F472B6", "#FBBF24", "#34D399", "#60A5FA", "#A78BFA"];
        const pieces = Array.from({ length: 28 }, (_, i) => ({
          id: i,
          color: colors[i % colors.length],
          left: Math.random() * 100,
          tx: (Math.random() - 0.5) * 200 + "px",
          rot: (Math.random() * 720 - 360) + "deg",
          delay: Math.random() * 0.2 + "s",
        }));
        setConfetti(pieces);
        setTimeout(() => { setDone(true); setTimeout(onTake, 900); }, 350);
      };
      return (
        <div className="relative rounded-2xl p-5 bg-amber2-500 text-white shadow-md overflow-hidden">
          {confetti.length > 0 && (
            <div className="absolute inset-0 pointer-events-none" style={{ overflow: "visible" }}>
              {confetti.map(p => (
                <span key={p.id} className="confetti-piece" style={{
                  left: p.left + "%", background: p.color,
                  animationDelay: p.delay,
                  ["--tx"]: p.tx, ["--rot"]: p.rot
                }}></span>
              ))}
            </div>
          )}
          <div className="flex items-end justify-between mb-4 mt-1">
            <div>
              <div className="text-4xl font-bold mb-1">{med.time}</div>
              <div className="text-lg">{med.name} · {med.dose}</div>
            </div>
            <div className="text-right text-sm opacity-90">{med.note}</div>
          </div>
          <button onClick={handle} disabled={animating} className={`relative w-full py-4 text-xl font-bold rounded-xl cursor-pointer transition flex items-center justify-center gap-2 ${done ? "bg-green-500 text-white" : "bg-white text-amber2-600 hover:bg-cream-50"}`}>
            {done ? (
              <>
                <svg viewBox="0 0 24 24" className="w-7 h-7" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                  <path className="anim-draw" d="m5 12 5 5L20 7" />
                </svg>
                <span className="anim-pop inline-block">已记录</span>
              </>
            ) : (
              <>
                <Icon name="check" className="w-7 h-7" stroke={2.5} />
                <span>我吃了</span>
              </>
            )}
          </button>
        </div>
      );
    }

    /* 漏服提醒卡片（未按时版本） */
    function MissedDoseCard({ med, onMakeUp, onConfirmMissed }) {
      const [madeUp, setMadeUp] = useState(false);
      const handleMakeUp = () => {
        setMadeUp(true);
        setTimeout(onMakeUp, 800);
      };
      return (
        <div className="relative rounded-2xl p-4 bg-stone-100 border border-stone-200 shadow-sm">
          <div className="flex items-center gap-2 mb-2">
            <Icon name="clock" className="w-5 h-5 text-stone-400" />
            <span className="text-base font-medium text-stone-500">{med.time} 的药</span>
            <span className="ml-auto text-xs text-stone-500 font-medium px-2 py-0.5 bg-stone-200 rounded-md">超时未服</span>
          </div>
          <div className="mb-3">
            <div className="text-2xl font-bold text-stone-700 mb-1">{med.name}</div>
            <div className="text-sm text-stone-500">{med.dose} · {med.note}</div>
          </div>
          {madeUp ? (
            <div className="w-full py-3 bg-stone-400 text-white text-lg font-bold rounded-xl flex items-center justify-center gap-2">
              <Icon name="check" className="w-6 h-6" stroke={2.5} />
              <span className="anim-pop inline-block">已记录</span>
            </div>
          ) : (
            <button onClick={handleMakeUp} className="w-full py-3 bg-stone-300 hover:bg-stone-400 text-stone-700 hover:text-white text-lg font-bold rounded-xl cursor-pointer transition flex items-center justify-center gap-2">
              <Icon name="check" className="w-6 h-6" stroke={2.5} />
              <span>我吃了</span>
            </button>
          )}
        </div>
      );
    }

    function ElderlyApp() {
      const [currentScreen, setCurrentScreen] = useState("home");
      const [showReminder, setShowReminder] = useState(false);
      const [bpPeriod, setBpPeriod] = useState("week");
      const [dayOffset, setDayOffset] = useState(0);
      const [weekOffset, setWeekOffset] = useState(0);
      const [monthOffset, setMonthOffset] = useState(0);
      const [yearOffset, setYearOffset] = useState(0);
      const [photoStep, setPhotoStep] = useState(0); // 0=未开始 1=拍摄中 2=识别结果 3=选时间 4=完成
      const [recognizedName, setRecognizedName] = useState("");
      const [chosenTimes, setChosenTimes] = useState([]);
      const [encouragementSeen, setEncouragementSeen] = useState(false);
      const [bpRecordStep, setBpRecordStep] = useState(0); // 0=未开始 1=拍照中 2=识别结果 3=确认保存 | 10=手动输入 11=手动确认
      const [bpRecordValues, setBpRecordValues] = useState({ sys: "", dia: "", hr: "" });

      const [medications, setMedications] = useState([
        { id: 1, name: "苯磺酸氨氯地平片", dose: "1片", time: "08:00", status: "missed", note: "餐后服用" },
        { id: 2, name: "二甲双胍缓释片", dose: "1片", time: "12:00", status: "pending", note: "随餐服用" },
        { id: 3, name: "阿托伐他汀钙片", dose: "1片", time: "20:00", status: "pending", note: "睡前服用" },
      ]);
      const bpRecords = [
        { date: "06-08 08:30", sys: 138, dia: 85, hr: 72 },
        { date: "06-07 08:15", sys: 142, dia: 88, hr: 75 },
        { date: "06-06 08:45", sys: 135, dia: 82, hr: 70 },
      ];
      const weekData = [
        { label: "6/2", sys: 136, dia: 84, hr: 71 },
        { label: "6/3", sys: 130, dia: 80, hr: 58 },
        { label: "6/4", sys: 148, dia: 92, hr: 78 },
        { label: "6/5", sys: 135, dia: 82, hr: 70 },
        { label: "6/6", sys: 135, dia: 82, hr: 72 },
        { label: "6/7", sys: 142, dia: 88, hr: 105 },
        { label: "6/8", sys: 138, dia: 85, hr: 72 },
      ];
      const monthData = Array.from({ length: 30 }, (_, i) => ({
        label: `${5 + Math.floor((i+9)/30)}/${((i+9) % 30) + 1}`,
        sys: 128 + Math.round(Math.sin(i/3) * 12 + (i % 5)),
        dia: 78 + Math.round(Math.cos(i/4) * 7 + (i % 3)),
        hr: 70 + Math.round(Math.sin(i/5) * 18),
      }));

      const handleTakeMed = (id) => {
        setMedications(medications.map(m => m.id === id ? { ...m, status: m.status === "missed" ? "late" : "taken" } : m));
        setShowReminder(false);
      };

      const nextMed = medications.find(m => m.status === "pending");
      const streak = 23;
      // 模拟今日子女鼓励
      const encouragement = { from: "女儿小丽", text: "妈妈辛苦了！", time: "21:08" };

      const Nav = () => (
        <div className="bg-cream-50 border-t border-cream-200 flex relative">
          <NavItem icon="home" label="今日用药" active={currentScreen==="home"} activeColor="text-amber2-600" onClick={() => setCurrentScreen("home")} />
          <NavItem icon="heart" label="血压" active={currentScreen==="bp"} activeColor="text-amber2-600" onClick={() => setCurrentScreen("bp")} />
        </div>
      );

      // 全屏用药提醒弹窗
      if (showReminder) {
        if (!nextMed) { setShowReminder(false); return null; }
        return (
          <div className="flex flex-col items-center justify-center h-full bg-amber2-400/20 p-6">
            <div className="w-20 h-20 rounded-full bg-amber2-500 text-white flex items-center justify-center mb-6 anim-pulse">
              <Icon name="pill" className="w-11 h-11" />
            </div>
            <div className="text-3xl font-bold text-stone-800 mb-4">该吃药了</div>
            <div className="bg-cream-50 rounded-2xl p-6 w-full max-w-sm shadow-lg mb-6 border border-cream-200">
              <div className="text-2xl font-bold text-center text-stone-900 mb-2">{nextMed.name}</div>
              <div className="text-xl text-center text-stone-600 mb-2">{nextMed.dose}</div>
              <div className="text-lg text-center text-amber2-600 font-medium">{nextMed.note}</div>
            </div>
            <div className="w-full max-w-sm mb-4"><TakeMedButton large onTake={() => handleTakeMed(nextMed.id)} /></div>
            <button onClick={() => setShowReminder(false)} className="w-full max-w-sm py-5 bg-cream-200 hover:bg-stone-200 text-stone-700 text-2xl font-bold rounded-2xl cursor-pointer transition">稍后提醒</button>
          </div>
        );
      }

      // 拍照添加 - 多步流程
      if (photoStep > 0) {
        const reset = () => { setPhotoStep(0); setRecognizedName(""); setChosenTimes([]); };
        const allTimes = ["08:00", "12:00", "18:00", "20:00", "22:00"];
        // Step1：拍摄
        if (photoStep === 1) {
          return (
            <div className="flex flex-col h-full bg-stone-900 text-white">
              <div className="px-5 py-4 flex items-center justify-between">
                <button onClick={reset} className="text-white text-lg cursor-pointer">取消</button>
                <span className="text-lg font-bold">拍摄药盒</span>
                <span className="w-12"></span>
              </div>
              <div className="flex-1 flex items-center justify-center p-6 relative">
                <div className="absolute inset-x-8 inset-y-20 border-2 border-amber2-400 rounded-2xl flex items-center justify-center">
                  <div className="text-center text-stone-400">
                    <Icon name="camera" className="w-14 h-14 mx-auto mb-2" />
                    <div className="text-base">请把药盒放入框内</div>
                  </div>
                </div>
              </div>
              <div className="p-6 flex justify-center">
                <button onClick={() => { setRecognizedName("苯磺酸氨氯地平片"); setPhotoStep(2); }} className="w-20 h-20 rounded-full bg-white border-4 border-amber2-400 cursor-pointer hover:scale-105 transition"></button>
              </div>
              <div className="text-center text-stone-400 text-sm pb-4">点击大圆按钮拍照</div>
            </div>
          );
        }
        // Step2：识别结果确认
        if (photoStep === 2) {
          return (
            <div className="flex flex-col h-full bg-cream-100">
              <div className="bg-cream-50 px-5 py-4 border-b border-cream-200 flex items-center justify-between">
                <button onClick={() => setPhotoStep(1)} className="text-amber2-600 cursor-pointer flex items-center gap-1"><Icon name="chevronLeft" className="w-5 h-5" stroke={2.5} />重拍</button>
                <span className="text-lg font-bold text-stone-800">识别结果</span>
                <span className="w-12"></span>
              </div>
              <div className="flex-1 overflow-auto p-5">
                <div className="bg-cream-50 border border-cream-200 rounded-2xl p-5 mb-5">
                  <div className="bg-stone-100 rounded-xl h-40 flex items-center justify-center mb-4 border border-stone-200">
                    <div className="text-center text-stone-400">
                      <Icon name="cameraLg" className="w-10 h-10 mx-auto mb-1" />
                      <div className="text-sm">药盒照片</div>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 mb-3">
                    <Icon name="sparkle" className="w-5 h-5 text-amber2-600" />
                    <span className="text-base text-amber2-600 font-medium">已识别到</span>
                  </div>
                  <div className="text-2xl font-bold text-stone-900 mb-2">{recognizedName}</div>
                  <div className="text-base text-stone-500">是这个药吗？</div>
                </div>
                <button onClick={() => setPhotoStep(3)} className="w-full py-5 bg-amber2-500 hover:bg-amber2-600 text-white text-xl font-bold rounded-2xl mb-3 cursor-pointer transition">是的，下一步</button>
                <button onClick={() => setPhotoStep(3)} className="w-full py-4 bg-cream-200 text-stone-600 text-lg rounded-2xl cursor-pointer hover:bg-stone-200 transition">不太对，发给子女确认</button>
              </div>
            </div>
          );
        }
        // Step3：选服药时间
        if (photoStep === 3) {
          const toggleTime = (t) => setChosenTimes(chosenTimes.includes(t) ? chosenTimes.filter(x=>x!==t) : [...chosenTimes, t]);
          return (
            <div className="flex flex-col h-full bg-cream-100">
              <div className="bg-cream-50 px-5 py-4 border-b border-cream-200 flex items-center justify-between">
                <button onClick={() => setPhotoStep(2)} className="text-amber2-600 cursor-pointer flex items-center gap-1"><Icon name="chevronLeft" className="w-5 h-5" stroke={2.5} />返回</button>
                <span className="text-lg font-bold text-stone-800">什么时间吃？</span>
                <span className="w-12"></span>
              </div>
              <div className="flex-1 overflow-auto p-5">
                <div className="text-base text-stone-500 mb-4">您每天什么时候吃这个药？（可多选）</div>
                <div className="space-y-3">
                  {allTimes.map(t => {
                    const sel = chosenTimes.includes(t);
                    return (
                      <button key={t} onClick={() => toggleTime(t)} className={`w-full py-5 rounded-2xl text-2xl font-bold cursor-pointer transition flex items-center justify-between px-6 border-2 ${sel ? "bg-amber2-500 text-white border-amber2-500" : "bg-cream-50 text-stone-700 border-cream-200"}`}>
                        <span>{t}</span>
                        {sel && <Icon name="check" className="w-7 h-7" stroke={3} />}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="p-5">
                <button onClick={() => setPhotoStep(4)} disabled={chosenTimes.length===0} className={`w-full py-5 text-xl font-bold rounded-2xl cursor-pointer transition ${chosenTimes.length>0 ? "bg-amber2-500 hover:bg-amber2-600 text-white" : "bg-stone-200 text-stone-400"}`}>完成</button>
              </div>
            </div>
          );
        }
        // Step4：完成
        if (photoStep === 4) {
          return (
            <div className="flex flex-col h-full bg-cream-100 items-center justify-center p-8">
              <div className="w-24 h-24 rounded-full bg-amber2-500 text-white flex items-center justify-center mb-6 anim-pop">
                <Icon name="check" className="w-14 h-14" stroke={3} />
              </div>
              <div className="text-2xl font-bold text-stone-800 mb-3">已发送给子女</div>
              <div className="text-base text-stone-500 text-center mb-6 leading-relaxed">
                我们已把药盒照片和服药时间<br/>发给您的子女，让他们补充剂量等信息<br/>稍后会自动开始提醒您
              </div>
              <div className="bg-cream-50 border border-cream-200 rounded-xl p-4 w-full max-w-xs mb-6">
                <div className="flex justify-between text-sm text-stone-500 mb-2"><span>药品</span><span className="text-stone-800 font-medium">{recognizedName || "待识别"}</span></div>
                <div className="flex justify-between text-sm text-stone-500"><span>服药时间</span><span className="text-stone-800 font-medium">{chosenTimes.join("、")}</span></div>
              </div>
              <button onClick={reset} className="w-full max-w-xs py-4 bg-amber2-500 text-white text-lg font-bold rounded-2xl cursor-pointer hover:bg-amber2-600 transition">返回药品列表</button>
            </div>
          );
        }
      }

      // 首页
      if (currentScreen === "home") {
        const pendingMeds = medications.filter(m => m.status === "pending");
        const takenMeds = medications.filter(m => m.status === "taken" || m.status === "late");
        const missedMeds = medications.filter(m => m.status === "missed");
        // 药盒 SVG 图标
        const PillboxIcon = ({ className }) => (
          <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
            <rect x="8" y="14" width="32" height="28" rx="4" />
            <path d="M8 22h32" />
            <path d="M24 22v20" />
            <rect x="6" y="8" width="36" height="6" rx="3" />
            <circle cx="16" cy="30" r="2" fill="currentColor" stroke="none" />
            <circle cx="32" cy="30" r="2" fill="currentColor" stroke="none" />
            <circle cx="16" cy="38" r="1.5" fill="currentColor" stroke="none" />
            <circle cx="32" cy="38" r="1.5" fill="currentColor" stroke="none" />
          </svg>
        );
        return (
          <div className="flex flex-col h-full bg-cream-100">
            {/* 顶部：连续天数 + 药盒入口 */}
            <div className="bg-cream-50 px-4 py-3 border-b border-cream-200 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <Icon name="flame" className="w-7 h-7 text-amber2-600" />
                <div className="leading-tight">
                  <div className="text-xs text-stone-500">连续按时服药</div>
                  <div className="flex items-baseline gap-0.5">
                    <span className="streak-num text-3xl font-extrabold text-amber2-600">{streak}</span>
                    <span className="text-base text-amber2-600 font-bold">天</span>
                    <span className="text-xs text-stone-400 ml-2">真棒～</span>
                  </div>
                </div>
              </div>
              {/* 药盒按钮 — 占顶部右侧约一半高度 */}
              <button onClick={() => setCurrentScreen("meds")} className="flex flex-col items-center justify-center w-20 h-16 rounded-2xl bg-amber2-400/15 hover:bg-amber2-400/25 text-amber2-600 cursor-pointer transition">
                <PillboxIcon className="w-10 h-10" />
                <span className="text-[11px] font-bold mt-0.5">我的药盒</span>
              </button>
            </div>
            <div className="flex-1 overflow-auto p-4 space-y-3 pb-20">
              {/* 今日鼓励卡片（缩小版） */}
              {!encouragementSeen && (
                <div className="rounded-xl p-3 bg-gradient-to-br from-rose-300 to-amber2-400 text-white shadow-sm">
                  <div className="flex items-center gap-3 mb-2">
                    <div className="w-9 h-9 rounded-full bg-white/40 flex items-center justify-center flex-shrink-0 text-lg">👩</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs opacity-90">{encouragement.from} · {encouragement.time}</div>
                      <div className="text-base font-bold leading-snug">{encouragement.text}</div>
                    </div>
                    <button onClick={() => setEncouragementSeen(true)} className="px-3 py-1.5 bg-white text-rose-500 text-sm font-bold rounded-lg cursor-pointer hover:bg-cream-50 transition flex-shrink-0">好的</button>
                  </div>
                </div>
              )}

              {/* 漏服提醒卡片（未按时版本） — 出现在下次服药前 */}
              {missedMeds.map((med) => (
                <MissedDoseCard key={med.id} med={med} onMakeUp={() => handleTakeMed(med.id)} onConfirmMissed={() => handleTakeMed(med.id)} />
              ))}

              {/* 第一卡片：下次服药提醒（按时版本，含我吃了 + 撒花） */}
              {nextMed ? (
                <NextDoseCard med={nextMed} onTake={() => handleTakeMed(nextMed.id)} />
              ) : (
                <div className="rounded-2xl p-5 bg-amber2-400/10 border-2 border-amber2-400/40 text-center">
                  <Icon name="check" className="w-10 h-10 text-amber2-600 mx-auto mb-2" stroke={3} />
                  <div className="text-lg font-bold text-amber2-600">今天的药都吃完啦</div>
                </div>
              )}

              {/* 待服用药品 */}
              {pendingMeds.filter(m => m.id !== (nextMed && nextMed.id)).map((med) => (
                <div key={med.id} className="rounded-2xl p-4 bg-cream-50 border border-cream-200 shadow-sm flex items-center gap-3">
                  <div className="w-12 h-12 rounded-xl bg-amber2-400/15 text-amber2-600 flex items-center justify-center flex-shrink-0">
                    <Icon name="clock" className="w-6 h-6" />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xl font-bold text-stone-800">{med.time}</div>
                    <div className="text-base text-stone-700 truncate">{med.name}</div>
                    <div className="text-sm text-stone-500">{med.dose} · {med.note}</div>
                  </div>
                  <span className="px-3 py-1 rounded-full text-xs font-bold bg-stone-200 text-stone-600 flex-shrink-0">待服用</span>
                </div>
              ))}

              {/* 已服用药品（前端统一显示已服用，后台区分按时/补服） */}
              {takenMeds.map((med) => (
                <div key={med.id} className="rounded-2xl p-4 bg-amber2-400/10 border border-amber2-400/30 shadow-sm flex items-center gap-3">
                  <div className="w-12 h-12 rounded-xl bg-amber2-500 text-white flex items-center justify-center flex-shrink-0">
                    <Icon name="check" className="w-7 h-7" stroke={3} />
                  </div>
                  <div className="flex-1 min-w-0">
                    <div className="text-xl font-bold text-stone-700">{med.time}</div>
                    <div className="text-base text-stone-700 truncate">{med.name}</div>
                    <div className="text-sm text-stone-500">{med.dose} · {med.note}</div>
                  </div>
                  <span className="px-3 py-1 rounded-full text-xs font-bold bg-amber2-500 text-white flex-shrink-0">已服用</span>
                </div>
              ))}

            </div>
            <Nav />
          </div>
        );
      }

      // 血压记录
      if (currentScreen === "bp") {
        // 血压拍照记录流程（合并：上方拍照区 + 下方识别/手动输入）
        if (bpRecordStep === 1) {
          const hasValues = bpRecordValues.sys && bpRecordValues.dia;
          const [photoTaken, setPhotoTaken] = [bpRecordValues.sys !== "", null];
          return (
            <div className="flex flex-col h-full bg-cream-100">
              <div className="bg-cream-50 px-5 py-3 border-b border-cream-200 flex items-center justify-between">
                <button onClick={() => setBpRecordStep(0)} className="text-amber2-600 cursor-pointer flex items-center gap-1"><Icon name="chevronLeft" className="w-5 h-5" stroke={2.5} />返回</button>
                <span className="text-lg font-bold text-stone-800">拍照记录</span>
                <span className="w-12"></span>
              </div>
              <div className="flex-1 overflow-auto">
                {/* 上方：拍照区 */}
                <div className="bg-stone-800 relative" style={{ height: "220px" }}>
                  {bpRecordValues.sys ? (
                    <div className="absolute inset-0 flex items-center justify-center">
                      <div className="text-center text-stone-300">
                        <Icon name="check" className="w-12 h-12 mx-auto mb-1 text-amber2-400" stroke={2.5} />
                        <div className="text-sm text-amber2-400 font-medium">已拍摄</div>
                        <button onClick={() => setBpRecordValues({ sys: "", dia: "", hr: "" })} className="mt-2 text-xs text-stone-400 underline cursor-pointer">重新拍照</button>
                      </div>
                    </div>
                  ) : (
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                      <div className="w-48 h-32 border-2 border-amber2-400 rounded-xl flex items-center justify-center mb-4">
                        <div className="text-center text-stone-400">
                          <Icon name="heart" className="w-10 h-10 mx-auto mb-1" />
                          <div className="text-sm">对准血压计屏幕</div>
                        </div>
                      </div>
                      <button onClick={() => setBpRecordValues({ sys: "138", dia: "85", hr: "72" })} className="w-16 h-16 rounded-full bg-white border-4 border-amber2-400 cursor-pointer hover:scale-105 transition"></button>
                    </div>
                  )}
                </div>
                {/* 下方：识别数值 / 手动输入 */}
                <div className="p-4 space-y-4">
                  <div className="text-base font-medium text-stone-700">{bpRecordValues.sys ? "识别结果（可修改）" : "请拍照或手动填写数值"}</div>
                  <div className="grid grid-cols-3 gap-3">
                    <div className="bg-cream-50 border border-cream-200 rounded-xl p-3">
                      <label className="text-xs text-stone-500 block mb-1 text-center">高压</label>
                      <input type="number" value={bpRecordValues.sys} onChange={e => setBpRecordValues({...bpRecordValues, sys: e.target.value})} placeholder="--" className="w-full text-2xl font-bold text-center text-stone-800 bg-transparent outline-none" />
                    </div>
                    <div className="bg-cream-50 border border-cream-200 rounded-xl p-3">
                      <label className="text-xs text-stone-500 block mb-1 text-center">低压</label>
                      <input type="number" value={bpRecordValues.dia} onChange={e => setBpRecordValues({...bpRecordValues, dia: e.target.value})} placeholder="--" className="w-full text-2xl font-bold text-center text-stone-800 bg-transparent outline-none" />
                    </div>
                    <div className="bg-cream-50 border border-cream-200 rounded-xl p-3">
                      <label className="text-xs text-stone-500 block mb-1 text-center">心率</label>
                      <input type="number" value={bpRecordValues.hr} onChange={e => setBpRecordValues({...bpRecordValues, hr: e.target.value})} placeholder="--" className="w-full text-2xl font-bold text-center text-stone-800 bg-transparent outline-none" />
                    </div>
                  </div>
                  {!bpRecordValues.sys && <div className="text-xs text-stone-400 text-center">拍照后数值会自动填入，识别不准确可手动修改</div>}
                </div>
              </div>
              <div className="p-4 border-t border-cream-200 bg-cream-50">
                <button onClick={() => setBpRecordStep(3)} disabled={!hasValues} className={`w-full py-5 text-xl font-bold rounded-2xl cursor-pointer transition ${hasValues ? "bg-amber2-500 hover:bg-amber2-600 text-white" : "bg-stone-200 text-stone-400"}`}>保存记录</button>
              </div>
            </div>
          );
        }
        // 保存成功
        if (bpRecordStep === 3) {
          return (
            <div className="flex flex-col h-full bg-cream-100 items-center justify-center p-8">
              <div className="w-24 h-24 rounded-full bg-amber2-500 text-white flex items-center justify-center mb-6 anim-pop">
                <Icon name="check" className="w-14 h-14" stroke={3} />
              </div>
              <div className="text-2xl font-bold text-stone-800 mb-3">记录成功</div>
              <div className="bg-cream-50 border border-cream-200 rounded-xl p-4 w-full max-w-xs mb-6">
                <div className="flex justify-between text-base text-stone-600 mb-2"><span>高压</span><span className="font-bold text-stone-800">{bpRecordValues.sys} mmHg</span></div>
                <div className="flex justify-between text-base text-stone-600 mb-2"><span>低压</span><span className="font-bold text-stone-800">{bpRecordValues.dia} mmHg</span></div>
                <div className="flex justify-between text-base text-stone-600"><span>心率</span><span className="font-bold text-stone-800">{bpRecordValues.hr} 次/分</span></div>
              </div>
              <button onClick={() => setBpRecordStep(0)} className="w-full max-w-xs py-4 bg-amber2-500 text-white text-lg font-bold rounded-2xl cursor-pointer hover:bg-amber2-600 transition">返回血压页</button>
            </div>
          );
        }

        const offsetMap = { day: dayOffset, week: weekOffset, month: monthOffset, year: yearOffset };
        const setOffsetMap = { day: setDayOffset, week: setWeekOffset, month: setMonthOffset, year: setYearOffset };
        const periodOffset = offsetMap[bpPeriod];
        // 不同段类型生成数据
        const genData = (kind, off) => {
          if (kind === "day") {
            return Array.from({ length: 6 }, (_, i) => {
              const seed = off * 6 + i;
              const hours = ["07:00","10:00","13:00","16:00","19:00","22:00"];
              return {
                label: hours[i],
                sys: 132 + Math.round(Math.sin(seed/1.3) * 10 + (seed%4)),
                dia: 82 + Math.round(Math.cos(seed/1.5) * 5 + (seed%2)),
                hr: 72 + Math.round(Math.sin(seed/1.6) * 10),
              };
            });
          }
          if (kind === "week") {
            return Array.from({ length: 7 }, (_, i) => {
              const seed = off * 7 + i;
              const baseDate = off === 0 ? `6/${2+i}` : off === 1 ? `5/${26+i}` : `5/${19+i}`;
              return {
                label: baseDate,
                sys: 130 + Math.round(Math.sin(seed/2) * 12 + (seed%5)),
                dia: 80 + Math.round(Math.cos(seed/2) * 7 + (seed%3)),
                hr: 72 + Math.round(Math.sin(seed/3) * 18),
              };
            });
          }
          if (kind === "month") {
            return Array.from({ length: 30 }, (_, i) => {
              const seed = off * 30 + i;
              return {
                label: `${off === 0 ? 6 : 5}/${(i % 30) + 1}`,
                sys: 128 + Math.round(Math.sin(seed/3) * 12 + (seed%5)),
                dia: 78 + Math.round(Math.cos(seed/4) * 7 + (seed%3)),
                hr: 70 + Math.round(Math.sin(seed/5) * 18),
              };
            });
          }
          // year
          return Array.from({ length: 12 }, (_, i) => {
            const seed = off * 12 + i;
            return {
              label: `${i + 1}月`,
              sys: 130 + Math.round(Math.sin(seed/2) * 8 + (seed%4)),
              dia: 80 + Math.round(Math.cos(seed/2) * 5 + (seed%2)),
              hr: 72 + Math.round(Math.sin(seed/3) * 12),
            };
          });
        };
        const data = genData(bpPeriod, periodOffset);
        // 段标签
        const periodLabel = (() => {
          if (bpPeriod === "day") return periodOffset === 0 ? "今天 6/8" : periodOffset === 1 ? "昨天 6/7" : `${periodOffset}天前`;
          if (bpPeriod === "week") return periodOffset === 0 ? "本周 6/2-6/8" : periodOffset === 1 ? "上周 5/26-6/1" : `${periodOffset}周前`;
          if (bpPeriod === "month") return periodOffset === 0 ? "6月" : periodOffset === 1 ? "5月" : `${periodOffset}月前`;
          return periodOffset === 0 ? "2026年" : `${2026 - periodOffset}年`;
        })();
        const shiftPeriod = (delta) => {
          const cur = offsetMap[bpPeriod];
          setOffsetMap[bpPeriod](Math.max(0, cur + delta));
        };
        // 触摸滑动（只绑定到趋势图区域）
        let touchStartX = 0;
        const onTouchStart = (e) => { touchStartX = e.touches[0].clientX; };
        const onTouchEnd = (e) => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 50) {
            if (dx > 0) shiftPeriod(1);
            else shiftPeriod(-1);
          }
        };
        const periods = [
          { key: "day", label: "天" },
          { key: "week", label: "周" },
          { key: "month", label: "月" },
          { key: "year", label: "年" },
        ];
        return (
          <div className="flex flex-col h-full bg-cream-100 relative">
            <div className="bg-cream-50 px-5 py-3 border-b border-cream-200">
              <div className="text-xl font-bold text-stone-800">血压记录</div>
            </div>
            {/* 时段条：天/周/月/年 + 段切换 */}
            <div className="bg-cream-50 px-3 py-2 border-b border-cream-200 flex items-center gap-2">
              <div className="flex bg-cream-200 rounded-lg p-0.5">
                {periods.map(p => (
                  <button key={p.key} onClick={() => setBpPeriod(p.key)} className={`px-3 py-1 rounded-md text-sm font-medium cursor-pointer ${bpPeriod === p.key ? "bg-amber2-500 text-white" : "text-stone-500"}`}>{p.label}</button>
                ))}
              </div>
              <div className="flex-1 flex items-center justify-end gap-1">
                <button onClick={() => shiftPeriod(1)} className="w-7 h-7 rounded-md hover:bg-cream-200 cursor-pointer flex items-center justify-center text-stone-600"><Icon name="chevronLeft" className="w-4 h-4" stroke={2.5} /></button>
                <span className="text-sm font-bold text-stone-700 px-1 min-w-[80px] text-center">{periodLabel}</span>
                <button onClick={() => shiftPeriod(-1)} disabled={periodOffset === 0} className={`w-7 h-7 rounded-md flex items-center justify-center cursor-pointer ${periodOffset === 0 ? "text-stone-300" : "text-stone-600 hover:bg-cream-200"}`}><Icon name="chevron" className="w-4 h-4" stroke={2.5} /></button>
              </div>
            </div>
            <div className="flex-1 overflow-auto p-3 space-y-3 pb-24">
              {/* 趋势图区域（左右滑动切段） */}
              <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} className="space-y-3">
                {/* 血压趋势 */}
                <div className="bg-cream-50 rounded-2xl p-3 shadow-sm border border-cream-200">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-base font-bold text-stone-700">血压</span>
                    <Legend items={[{ label: "高压", color: "#E8924A" },{ label: "低压", color: "#7C9CB5" }]} />
                  </div>
                  <LineTrend data={data} height={100} warnLines={[
                    { value: 140, color: "#DC2626", label: "高压警戒" },
                    { value: 90, color: "#7C9CB5", label: "低压警戒" },
                  ]} lines={[
                    { key: "sys", color: "#E8924A", abnormalCheck: v => v >= 140 },
                    { key: "dia", color: "#7C9CB5", abnormalCheck: v => v >= 90 },
                  ]} />
                </div>
                {/* 心率趋势 */}
                <div className="bg-cream-50 rounded-2xl p-3 shadow-sm border border-cream-200">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-base font-bold text-stone-700">心率</span>
                    <Legend items={[{ label: "心率", color: "#C99A8C" },{ label: "正常 60-100", color: "#A8A29E" }]} />
                  </div>
                  <LineTrend data={data} height={80} warnLines={[
                    { value: 100, color: "#A8A29E", label: "上限" },
                    { value: 60, color: "#A8A29E", label: "下限" },
                  ]} lines={[
                    { key: "hr", color: "#C99A8C", abnormalCheck: v => v < 60 || v > 100 },
                  ]} />
                </div>
                <div className="text-xs text-stone-400 text-center">← 左右滑动趋势图查看其他时段 →</div>
              </div>
              {/* 拍照记录按钮 */}
              <button onClick={() => { setBpRecordValues({ sys: "", dia: "", hr: "" }); setBpRecordStep(1); }} className="w-full py-5 bg-amber2-500 hover:bg-amber2-600 text-white rounded-2xl shadow-sm flex items-center justify-center gap-3 cursor-pointer transition">
                <Icon name="camera" className="w-8 h-8" />
                <div className="text-left">
                  <div className="text-xl font-bold">拍照记录</div>
                  <div className="text-sm opacity-80">对着血压计屏幕拍一下</div>
                </div>
