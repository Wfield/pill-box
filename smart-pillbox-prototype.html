              <span className="font-bold text-stone-800">添加药品</span>
              <button onClick={() => setShowAddMed(false)} className="text-amber2-600 font-bold text-base cursor-pointer">保存</button>
            </div>
            <div className="flex-1 overflow-auto p-4">
              <div className="bg-cream-50 rounded-xl p-4 shadow-sm border border-cream-200">
                <div className="border-2 border-dashed border-stone-300 rounded-xl p-8 flex flex-col items-center gap-2 mb-4 cursor-pointer hover:bg-cream-100 transition">
                  <Icon name="camera" className="w-8 h-8 text-stone-400" />
                  <span className="text-stone-500">拍照识别药品</span>
                </div>
                <div className="space-y-4">
                  <div>
                    <label className="text-sm text-stone-500 block mb-1">药品名称 *</label>
                    <input className="w-full border border-stone-300 rounded-lg px-3 py-2 outline-none focus:border-amber2-500 bg-white" placeholder="输入或拍照识别" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-sm text-stone-500 block mb-1">每次剂量 *</label>
                      <div className="flex items-center border border-stone-300 rounded-lg overflow-hidden bg-white">
                        <input className="flex-1 px-3 py-2 outline-none w-full" placeholder="1" />
                        <select className="bg-cream-100 px-2 py-2 border-l border-stone-300 outline-none"><option>片</option><option>粒</option><option>ml</option></select>
                      </div>
                    </div>
                    <div>
                      <label className="text-sm text-stone-500 block mb-1">包装数量</label>
                      <input className="w-full border border-stone-300 rounded-lg px-3 py-2 outline-none focus:border-amber2-500 bg-white" placeholder="如 30 片/盒" />
                    </div>
                  </div>
                  <div>
                    <label className="text-sm text-stone-500 block mb-1">服用时间 *</label>
                    <div className="flex flex-wrap gap-2">
                      <span className="px-3 py-1 bg-amber2-400/20 text-amber2-600 rounded-full text-sm">08:00 ×</span>
                      <button className="px-3 py-1 border border-dashed border-stone-300 rounded-full text-sm text-stone-500 cursor-pointer hover:bg-cream-100">+ 添加时间</button>
                    </div>
                  </div>
                  <div>
                    <label className="text-sm text-stone-500 block mb-1">备注</label>
                    <input className="w-full border border-stone-300 rounded-lg px-3 py-2 outline-none focus:border-amber2-500 bg-white" placeholder="餐前/餐后/特殊提示" />
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 老人详情 - 药品（日历视图 + 药品管理 子tab）
      if (view.screen === "elderMeds") {
        const subTab = view.medsSub || "calendar"; // calendar | manage
        // 当前月（演示固定 2026-06）
        const monthOffset = view.monthOffset || 0;
        const today = new Date(2026, 5, 8); // 月份从0开始：5=June
        const cursor = new Date(2026, 5 - monthOffset, 1);
        const year = cursor.getFullYear();
        const month = cursor.getMonth(); // 0-11
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDow = new Date(year, month, 1).getDay(); // 0=周日
        const todayDate = today.getDate();
        const isCurrentMonth = (year === today.getFullYear() && month === today.getMonth());
        // 药品筛选
        const medFilter = view.medFilter || "all";

        // 生成每天每个药的状态（确定性 mock）
        const dayStatus = (d, medId) => {
          if (year > today.getFullYear() || (year === today.getFullYear() && month > today.getMonth())) return "future";
          if (isCurrentMonth && d > todayDate) return "future";
          if (isCurrentMonth && d === todayDate && medId === 2) return "pending"; // 今天的二甲双胍待服
          // 模拟规律：周日的二甲双胍(id=2)经常漏服
          const dt = new Date(year, month, d);
          if (dt.getDay() === 0 && medId === 2 && d % 14 < 8) return "missed";
          // 6/4 氨氯地平漏服
          if (d === 4 && month === 5 && medId === 1) return "missed";
          // 6/5 二甲双胍漏服
          if (d === 5 && month === 5 && medId === 2) return "missed";
          // 偶发补服
          if ((d * (medId + 1)) % 11 === 0 && d > 1) return "late";
          return "taken";
        };

        // 当天聚合状态（用于格子底色）
        const dayAggregate = (d) => {
          const meds = medFilter === "all" ? parentMeds : parentMeds.filter(m => m.id === medFilter);
          const statuses = meds.map(m => dayStatus(d, m.id));
          if (statuses.every(s => s === "future")) return "future";
          if (statuses.includes("missed")) return "missed";
          if (statuses.includes("pending")) return "pending";
          if (statuses.includes("late")) return "late";
          if (statuses.every(s => s === "taken")) return "taken";
          return "none";
        };

        const cellColor = {
          taken: "bg-amber2-400/30 text-stone-700 border border-amber2-400/40",
          late: "bg-yellow-100 text-stone-700 border border-yellow-200",
          missed: "bg-rose-100 text-stone-700 border border-rose-200",
          pending: "bg-cream-50 text-stone-600 border border-cream-200",
          future: "bg-transparent text-stone-300",
          none: "bg-stone-50 text-stone-400",
        };

        // 当月统计
        const allDays = Array.from({ length: daysInMonth }, (_, i) => i + 1)
          .filter(d => !(isCurrentMonth && d > todayDate));
        let takenCount = 0, missedCount = 0, fullDays = 0;
        allDays.forEach(d => {
          const meds = medFilter === "all" ? parentMeds : parentMeds.filter(m => m.id === medFilter);
          const ss = meds.map(m => dayStatus(d, m.id));
          if (ss.every(s => s === "taken")) fullDays++;
          ss.forEach(s => { if (s === "taken" || s === "late") takenCount++; if (s === "missed") missedCount++; });
        });
        const totalTasks = takenCount + missedCount;
        const onTimeRate = totalTasks ? Math.round((takenCount / totalTasks) * 100) : 0;

        // 选中日期详情
        const selectedDay = view.selectedDay;
        const buildDayTimeline = (d) => {
          const list = [];
          parentMeds.forEach(m => {
            m.times.forEach(t => {
              const s = dayStatus(d, m.id);
              if (s === "future") return;
              list.push({ time: t, name: m.name, dose: m.dose, status: s });
            });
          });
          return list.sort((a, b) => a.time.localeCompare(b.time));
        };

        // 渲染日历格子
        const cells = [];
        for (let i = 0; i < firstDow; i++) cells.push(null);
        for (let d = 1; d <= daysInMonth; d++) cells.push(d);
        while (cells.length % 7 !== 0) cells.push(null);

        const monthLabel = `${year}年${month + 1}月`;

        return (
          <div className="flex flex-col h-full bg-cream-100">
            <div className="bg-cream-50 px-4 py-3 border-b border-cream-200 flex items-center gap-3">
              <button onClick={() => setView({ screen: "overview", elderId: null })} className="cursor-pointer text-stone-500 hover:text-stone-700"><Icon name="chevronLeft" className="w-6 h-6" stroke={2.5} /></button>
              <span className="flex-1 font-bold text-stone-800 text-lg">{elder.name.split('（')[0]} · 药品</span>
            </div>

            {/* 子 Tab 切换 */}
            <div className="bg-cream-50 px-4 pb-2 border-b border-cream-200 flex gap-1">
              <button onClick={() => setView({ ...view, medsSub: "calendar" })} className={`flex-1 py-2.5 text-sm font-bold rounded-lg cursor-pointer transition ${subTab === "calendar" ? "bg-amber2-500 text-white" : "bg-cream-100 text-stone-500"}`}>用药日历</button>
              <button onClick={() => setView({ ...view, medsSub: "manage" })} className={`flex-1 py-2.5 text-sm font-bold rounded-lg cursor-pointer transition ${subTab === "manage" ? "bg-amber2-500 text-white" : "bg-cream-100 text-stone-500"}`}>药品管理</button>
            </div>

            {subTab === "calendar" && (
              <div className="flex-1 overflow-auto">
                {/* 月份切换 + 药品筛选 */}
                <div className="bg-cream-50 px-4 py-3 border-b border-cream-200 flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <button onClick={() => setView({ ...view, monthOffset: monthOffset + 1, selectedDay: null })} className="w-8 h-8 rounded-lg hover:bg-cream-200 cursor-pointer flex items-center justify-center text-stone-600"><Icon name="chevronLeft" className="w-4 h-4" stroke={2.5} /></button>
                    <span className="text-base font-bold text-stone-800 min-w-[88px] text-center">{monthLabel}</span>
                    <button onClick={() => setView({ ...view, monthOffset: Math.max(0, monthOffset - 1), selectedDay: null })} disabled={monthOffset === 0} className={`w-8 h-8 rounded-lg flex items-center justify-center cursor-pointer ${monthOffset === 0 ? "text-stone-300" : "text-stone-600 hover:bg-cream-200"}`}><Icon name="chevron" className="w-4 h-4" stroke={2.5} /></button>
                  </div>
                  <select value={medFilter} onChange={e => setView({ ...view, medFilter: e.target.value === "all" ? "all" : Number(e.target.value), selectedDay: null })} className="bg-cream-100 border border-cream-200 rounded-lg px-3 py-1.5 text-sm text-stone-700 cursor-pointer outline-none">
                    <option value="all">全部药品</option>
                    {parentMeds.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                  </select>
                </div>

                {/* 月度小结（月份和日历之间） */}
                <div className="flex items-center justify-around px-3 py-2 bg-cream-50 border-b border-cream-200">
                  <div className="text-center">
                    <div className="text-lg font-bold text-amber2-600">{onTimeRate}<span className="text-xs">%</span></div>
                    <div className="text-[10px] text-stone-500">按时率</div>
                  </div>
                  <div className="w-px h-7 bg-cream-200"></div>
                  <div className="text-center">
                    <div className={`text-lg font-bold ${missedCount > 0 ? "text-rose-500" : "text-stone-700"}`}>{missedCount}</div>
                    <div className="text-[10px] text-stone-500">漏服次数</div>
                  </div>
                  <div className="w-px h-7 bg-cream-200"></div>
                  <div className="text-center">
                    <div className="text-lg font-bold text-amber2-600">{fullDays}</div>
                    <div className="text-[10px] text-stone-500">全勤天数</div>
                  </div>
                </div>

                {/* 日历主体 */}
                <div className="p-3">
                  <div className="grid grid-cols-7 gap-1 mb-1">
                    {["日", "一", "二", "三", "四", "五", "六"].map((w, i) => (
                      <div key={i} className={`text-center text-xs py-1 ${i === 0 || i === 6 ? "text-stone-400" : "text-stone-500"}`}>{w}</div>
                    ))}
                  </div>
                  <div className="grid grid-cols-7 gap-1">
                    {cells.map((d, i) => {
                      if (d === null) return <div key={i} className="aspect-square"></div>;
                      const agg = dayAggregate(d);
                      const isToday = isCurrentMonth && d === todayDate;
                      const isSelected = selectedDay === d;
                      return (
                        <button key={i} onClick={() => agg !== "future" && setView({ ...view, selectedDay: isSelected ? null : d })}
                          className={`aspect-square rounded-lg text-sm font-medium cursor-pointer transition relative flex items-center justify-center ${cellColor[agg]} ${isToday ? "ring-2 ring-amber2-500" : ""} ${isSelected ? "ring-2 ring-stone-700" : ""} ${agg === "future" ? "cursor-default" : "hover:opacity-80"}`}>
                          {d}
                        </button>
                      );
                    })}
                  </div>

                  {/* 图例 */}
                  <div className="flex items-center justify-around mt-3 px-2 py-2 bg-cream-50 rounded-lg border border-cream-200 text-xs text-stone-500">
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-amber2-400/30 border border-amber2-400/40"></span>按时</div>
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-yellow-100 border border-yellow-200"></span>补服</div>
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-rose-100 border border-rose-200"></span>漏服</div>
                    <div className="flex items-center gap-1.5"><span className="w-3 h-3 rounded bg-cream-50 border border-cream-200"></span>待服</div>
                  </div>

                  {/* 当天详情面板 */}
                  {selectedDay && (() => {
                    const timeline = buildDayTimeline(selectedDay);
                    const missedNum = timeline.filter(t => t.status === "missed").length;
                    return (
                      <div className="mt-3 bg-cream-50 rounded-xl border border-cream-200 shadow-sm overflow-hidden">
                        <div className="px-4 py-3 border-b border-cream-200 flex items-center justify-between">
                          <div>
                            <div className="font-bold text-stone-800">{month + 1}月{selectedDay}日</div>
                            <div className="text-xs text-stone-500 mt-0.5">
                              {timeline.length} 次服药 {missedNum > 0 && <span className="text-rose-500">· {missedNum} 次漏服</span>}
                              {timeline.length === 0 && "当天无服药任务"}
                            </div>
                          </div>
                          <button onClick={() => setView({ ...view, selectedDay: null })} className="text-xs text-stone-400 hover:text-stone-600 cursor-pointer">收起</button>
                        </div>
                        <div className="divide-y divide-cream-200">
                          {timeline.map((t, i) => {
                            const cfg = {
                              taken: { tag: "按时", cls: "bg-amber2-500 text-white", icon: "check" },
                              late: { tag: "补服", cls: "bg-yellow-400 text-white", icon: "check" },
                              missed: { tag: "漏服", cls: "bg-rose-500 text-white", icon: "warn" },
                              pending: { tag: "待服", cls: "bg-stone-300 text-stone-600", icon: "clock" },
                            }[t.status];
                            return (
                              <div key={i} className="px-4 py-3 flex items-center gap-3">
                                <div className="text-sm font-bold text-stone-700 w-12">{t.time}</div>
                                <div className="flex-1 min-w-0">
                                  <div className="text-sm text-stone-800 truncate">{t.name}</div>
                                  <div className="text-xs text-stone-400">{t.dose}</div>
                                </div>
                                <span className={`px-2 py-1 rounded text-xs font-bold flex items-center gap-1 ${cfg.cls}`}>
                                  <Icon name={cfg.icon} className="w-3 h-3" stroke={3} />
                                  {cfg.tag}
                                </span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              </div>
            )}

            {subTab === "manage" && (
              <div className="flex-1 overflow-auto p-4 space-y-3">
                {/* 编辑药品流程 */}
                {editingMed !== null ? (() => {
                  const med = parentMeds.find(m => m.id === editingMed);
                  if (!med) return null;
                  return (
                    <div className="space-y-4">
                      <div className="flex items-center justify-between">
                        <button onClick={() => setEditingMed(null)} className="text-amber2-600 cursor-pointer flex items-center gap-1"><Icon name="chevronLeft" className="w-5 h-5" stroke={2.5} />返回</button>
                        <span className="font-bold text-stone-800">编辑药品</span>
                        <span className="w-12"></span>
                      </div>
                      <div className="bg-cream-50 border border-cream-200 rounded-2xl p-4 space-y-4">
                        <div>
                          <label className="text-sm text-stone-500 block mb-1">药品名称</label>
                          <input type="text" defaultValue={med.name} className="w-full text-lg font-bold text-stone-800 bg-transparent outline-none border-b-2 border-amber2-400 pb-2" />
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="text-sm text-stone-500 block mb-1">单次剂量</label>
                            <input type="text" defaultValue={med.dose} className="w-full text-base text-stone-800 bg-transparent outline-none border-b border-cream-200 pb-1" />
                          </div>
                          <div>
                            <label className="text-sm text-stone-500 block mb-1">备注</label>
                            <input type="text" defaultValue={med.note} className="w-full text-base text-stone-800 bg-transparent outline-none border-b border-cream-200 pb-1" />
                          </div>
                        </div>
                        <div>
                          <label className="text-sm text-stone-500 block mb-1">服药时间</label>
                          <div className="flex gap-2 flex-wrap">
                            {med.times.map((t, i) => (
                              <span key={i} className="px-3 py-2 bg-amber2-400/20 text-amber2-600 rounded-lg text-base font-bold">{t}</span>
                            ))}
                            <button className="px-3 py-2 border border-dashed border-stone-300 rounded-lg text-stone-400 text-sm cursor-pointer hover:bg-cream-50">+ 添加时间</button>
                          </div>
                        </div>
                        <div className="grid grid-cols-2 gap-3">
                          <div>
                            <label className="text-sm text-stone-500 block mb-1">包装数量（片）</label>
                            <input type="number" defaultValue="30" className="w-full text-base text-stone-800 bg-transparent outline-none border-b border-cream-200 pb-1" />
                          </div>
                          <div>
                            <label className="text-sm text-stone-500 block mb-1">低于多少天提醒</label>
                            <input type="number" defaultValue="10" className="w-full text-base text-stone-800 bg-transparent outline-none border-b border-cream-200 pb-1" />
                          </div>
                        </div>
                      </div>
                      <button onClick={() => setEditingMed(null)} className="w-full py-4 bg-amber2-500 hover:bg-amber2-600 text-white text-lg font-bold rounded-2xl cursor-pointer transition">保存修改</button>
                      <div className="flex gap-3">
                        <button className="flex-1 py-3 bg-stone-100 border border-stone-200 text-stone-600 font-medium rounded-xl cursor-pointer hover:bg-stone-200 transition">暂停服药</button>
                        <button className="flex-1 py-3 bg-rose-50 border border-rose-200 text-rose-500 font-medium rounded-xl cursor-pointer hover:bg-rose-100 transition">删除药品</button>
                      </div>
                    </div>
                  );
                })() : (
                  <>
                    <button onClick={() => setShowAddMed(true)} className="w-full py-3 bg-amber2-500 hover:bg-amber2-600 text-white rounded-xl text-base font-bold cursor-pointer transition flex items-center justify-center gap-2">
                      <Icon name="plus" className="w-5 h-5" stroke={2.5} /> 添加新药品
                    </button>
                    {parentMeds.map(med => {
                      const needRestock = med.remaining <= 10;
                      return (
                        <div key={med.id} className={`bg-cream-50 rounded-xl p-4 shadow-sm border ${needRestock ? "border-rose-200" : "border-cream-200"}`}>
                          <div className="flex justify-between items-start mb-3">
                            <div className="flex items-start gap-3 flex-1 min-w-0">
                              <div className={`w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0 ${needRestock ? "bg-rose-100 text-rose-500" : "bg-amber2-400/20 text-amber2-600"}`}>
                                <Icon name="pill" className="w-6 h-6" />
                              </div>
                              <div className="flex-1 min-w-0">
                                <div className="font-bold text-stone-800 truncate">{med.name}</div>
                                <div className="text-sm text-stone-500 mt-0.5">每次 {med.dose} · {med.note}</div>
                                <div className="text-sm text-amber2-600 mt-0.5">每天 {med.times.join("、")}</div>
                              </div>
                            </div>
                            <button onClick={() => setEditingMed(med.id)} className="text-stone-400 cursor-pointer hover:text-stone-600 flex-shrink-0 ml-2"><Icon name="edit" className="w-5 h-5" /></button>
                          </div>
                          <div className="flex items-center justify-between pt-3 border-t border-cream-200">
                            <div className="text-sm">
                              {needRestock ? (
                                <span className="text-rose-500 font-bold flex items-center gap-1">
                                  <Icon name="warn" className="w-4 h-4" /> 待补药 · 剩余 {med.remaining} 天
                                </span>
                              ) : (
                                <span className="text-stone-600">📦 余量 {med.remaining} 天</span>
                              )}
                            </div>
                            {needRestock ? (
                              <button className="text-xs px-3 py-1.5 bg-amber2-500 text-white rounded-lg cursor-pointer hover:bg-amber2-600 font-bold">已补药</button>
                            ) : (
                              <button className="text-xs px-2 py-1 bg-cream-200 text-stone-500 rounded cursor-pointer hover:bg-stone-200">已补药</button>
                            )}
                          </div>
                        </div>
                      );
                    })}
                    <div className="text-xs text-stone-400 text-center pt-2">想看用药执行情况？切到「用药日历」</div>
                  </>
                )}
              </div>
            )}
            <ElderNav />
          </div>
        );
      }

      // 老人详情 - 血压心率（与老人端交互一致：天/周/月/年 + 滑动切段）
      if (view.screen === "elderBp") {
        const periodOffset = view.bpOffset || 0;
        const genData = (kind, off) => {
          if (kind === "day") {
            return Array.from({ length: 6 }, (_, i) => {
              const seed = off * 6 + i;
              const hours = ["07:00","10:00","13:00","16:00","19:00","22:00"];
              return {
                label: hours[i],
                sys: 132 + Math.round(Math.sin(seed/1.3) * 10 + (seed%4)),
                dia: 82 + Math.round(Math.cos(seed/1.5) * 5 + (seed%2)),
                hr: 72 + Math.round(Math.sin(seed/1.6) * 10),
              };
            });
          }
          if (kind === "week") {
            return Array.from({ length: 7 }, (_, i) => {
              const seed = off * 7 + i;
              const baseDate = off === 0 ? `6/${2+i}` : off === 1 ? `5/${26+i}` : `5/${19+i}`;
              return {
                label: baseDate,
                sys: 130 + Math.round(Math.sin(seed/2) * 12 + (seed%5)),
                dia: 80 + Math.round(Math.cos(seed/2) * 7 + (seed%3)),
                hr: 72 + Math.round(Math.sin(seed/3) * 18),
              };
            });
          }
          if (kind === "month") {
            return Array.from({ length: 30 }, (_, i) => {
              const seed = off * 30 + i;
              return {
                label: `${off === 0 ? 6 : 5}/${(i % 30) + 1}`,
                sys: 128 + Math.round(Math.sin(seed/3) * 12 + (seed%5)),
                dia: 78 + Math.round(Math.cos(seed/4) * 7 + (seed%3)),
                hr: 70 + Math.round(Math.sin(seed/5) * 18),
              };
            });
          }
          return Array.from({ length: 12 }, (_, i) => {
            const seed = off * 12 + i;
            return {
              label: `${i + 1}月`,
              sys: 130 + Math.round(Math.sin(seed/2) * 8 + (seed%4)),
              dia: 80 + Math.round(Math.cos(seed/2) * 5 + (seed%2)),
              hr: 72 + Math.round(Math.sin(seed/3) * 12),
            };
          });
        };
        const data = genData(bpPeriod, periodOffset);
        const periodLabel = (() => {
          if (bpPeriod === "day") return periodOffset === 0 ? "今天 6/8" : periodOffset === 1 ? "昨天 6/7" : `${periodOffset}天前`;
          if (bpPeriod === "week") return periodOffset === 0 ? "本周 6/2-6/8" : periodOffset === 1 ? "上周 5/26-6/1" : `${periodOffset}周前`;
          if (bpPeriod === "month") return periodOffset === 0 ? "6月" : periodOffset === 1 ? "5月" : `${periodOffset}月前`;
          return periodOffset === 0 ? "2026年" : `${2026 - periodOffset}年`;
        })();
        const shiftPeriod = (delta) => setView({ ...view, bpOffset: Math.max(0, periodOffset + delta) });
        let touchStartX = 0;
        const onTouchStart = (e) => { touchStartX = e.touches[0].clientX; };
        const onTouchEnd = (e) => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          if (Math.abs(dx) > 50) {
            if (dx > 0) shiftPeriod(1);
            else shiftPeriod(-1);
          }
        };
        const periods = [
          { key: "day", label: "天" },
          { key: "week", label: "周" },
          { key: "month", label: "月" },
          { key: "year", label: "年" },
        ];
        return (
          <div className="flex flex-col h-full bg-cream-100">
            <div className="bg-cream-50 px-4 py-3 border-b border-cream-200 flex items-center gap-3">
              <button onClick={() => setView({ screen: "overview", elderId: null })} className="cursor-pointer text-stone-500 hover:text-stone-700"><Icon name="chevronLeft" className="w-6 h-6" stroke={2.5} /></button>
              <span className="flex-1 font-bold text-stone-800 text-lg">{elder.name.split('（')[0]} · 血压心率</span>
            </div>
            {/* 时段条：天/周/月/年 + 段切换 */}
            <div className="bg-cream-50 px-3 py-2 border-b border-cream-200 flex items-center gap-2">
              <div className="flex bg-cream-200 rounded-lg p-0.5">
                {periods.map(p => (
                  <button key={p.key} onClick={() => { setBpPeriod(p.key); setView({ ...view, bpOffset: 0 }); }} className={`px-3 py-1 rounded-md text-sm font-medium cursor-pointer ${bpPeriod === p.key ? "bg-amber2-500 text-white" : "text-stone-500"}`}>{p.label}</button>
                ))}
              </div>
              <div className="flex-1 flex items-center justify-end gap-1">
                <button onClick={() => shiftPeriod(1)} className="w-7 h-7 rounded-md hover:bg-cream-200 cursor-pointer flex items-center justify-center text-stone-600"><Icon name="chevronLeft" className="w-4 h-4" stroke={2.5} /></button>
                <span className="text-sm font-bold text-stone-700 px-1 min-w-[80px] text-center">{periodLabel}</span>
                <button onClick={() => shiftPeriod(-1)} disabled={periodOffset === 0} className={`w-7 h-7 rounded-md flex items-center justify-center cursor-pointer ${periodOffset === 0 ? "text-stone-300" : "text-stone-600 hover:bg-cream-200"}`}><Icon name="chevron" className="w-4 h-4" stroke={2.5} /></button>
              </div>
            </div>
            <div className="flex-1 overflow-auto p-3 space-y-3">
              {/* 趋势图区域（左右滑动切段） */}
              <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} className="space-y-3">
                <div className="bg-cream-50 rounded-xl p-3 shadow-sm border border-cream-200">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-bold text-stone-700">血压</span>
                    <Legend items={[{ label: "高压", color: "#E8924A" },{ label: "低压", color: "#7C9CB5" }]} />
                  </div>
                  <LineTrend data={data} height={120} warnLines={[
                    { value: 140, color: "#DC2626", label: "高压警戒" },
                    { value: 90, color: "#7C9CB5", label: "低压警戒" },
                  ]} lines={[
                    { key: "sys", color: "#E8924A", abnormalCheck: v => v >= 140 },
                    { key: "dia", color: "#7C9CB5", abnormalCheck: v => v >= 90 },
                  ]} />
                </div>
                <div className="bg-cream-50 rounded-xl p-3 shadow-sm border border-cream-200">
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-bold text-stone-700">心率</span>
                    <Legend items={[{ label: "心率", color: "#C99A8C" },{ label: "正常 60-100", color: "#A8A29E" }]} />
                  </div>
                  <LineTrend data={data} height={100} warnLines={[
                    { value: 100, color: "#A8A29E", label: "上限" },
                    { value: 60, color: "#A8A29E", label: "下限" },
                  ]} lines={[
                    { key: "hr", color: "#C99A8C", abnormalCheck: v => v < 60 || v > 100 },
                  ]} />
                </div>
                <div className="text-xs text-stone-400 text-center">← 左右滑动趋势图查看其他时段 →</div>
              </div>
              <div className="bg-cream-50 rounded-xl p-3 shadow-sm border border-cream-200">
                <div className="text-sm font-bold text-stone-700 mb-3">详细记录</div>
                {data.slice().reverse().slice(0, 7).map((d, i) => (
                  <div key={i} className="flex justify-between py-2 border-b border-cream-200 last:border-0">
                    <span className="text-sm text-stone-500">{d.label}</span>
                    <span className="text-sm">
                      <span className={`font-bold ${d.sys >= 140 || d.dia >= 90 ? "text-rose-600" : "text-stone-800"}`}>{d.sys}/{d.dia}</span>
                      <span className="text-stone-400"> · </span>
                      <span className={`font-bold ${d.hr < 60 || d.hr > 100 ? "text-rose-600" : "text-stone-800"}`}>{d.hr}</span>
                    </span>
                  </div>
                ))}
              </div>
            </div>
            <ElderNav />
          </div>
        );
      }

      // 老人详情 - 设置
      if (view.screen === "elderSettings") {
        const Row = ({ label, value, toggle }) => (
          <div className="px-4 py-3 border-b border-cream-200 last:border-0 flex justify-between items-center cursor-pointer hover:bg-cream-100">
            <span className="text-stone-800">{label}</span>
            {toggle ? (
              <div className="w-10 h-6 bg-amber2-500 rounded-full relative"><div className="w-5 h-5 bg-white rounded-full absolute right-0.5 top-0.5 shadow"></div></div>
            ) : (
              <span className="text-stone-400 text-sm flex items-center gap-1">{value} <Icon name="chevron" className="w-3.5 h-3.5" stroke={2.5} /></span>
            )}
          </div>
        );
        return (
          <div className="flex flex-col h-full bg-cream-100">
            <div className="bg-cream-50 px-4 py-3 border-b border-cream-200 flex items-center gap-3">
              <button onClick={() => setView({...view, screen: "elderHome"})} className="cursor-pointer text-stone-500 hover:text-stone-700"><Icon name="chevronLeft" className="w-6 h-6" stroke={2.5} /></button>
              <span className="flex-1 font-bold text-stone-800 text-lg">{elder.name.split('（')[0]} · 设置</span>
            </div>
            <div className="flex-1 overflow-auto p-4 space-y-4">
              <div className="bg-cream-50 rounded-xl shadow-sm border border-cream-200 overflow-hidden">
                <Row label="提醒宽限期" value="30 分钟" />
                <Row label="代提醒通知" toggle />
                <Row label="血压警戒阈值" value="140/90 mmHg" />
                <Row label="每日小结推送" toggle />
                <Row label="解除绑定" value="" />
              </div>
              <div className="bg-cream-50 rounded-xl shadow-sm border border-cream-200 overflow-hidden">
                <Row label="账号信息" value="" />
                <Row label="关于" value="v1.0.0" />
              </div>
            </div>
            <ElderNav />
          </div>
        );
      }
      return null;
    }

    // ==================== 主组件 ====================
    function SmartPillboxPrototype() {
      const [activeTab, setActiveTab] = useState("elderly");
      return (
        <div className="min-h-screen flex flex-col items-center py-8 px-4" style={{background:'linear-gradient(135deg,#EFE7DA,#E5DACA)'}}>
          <h1 className="text-2xl font-bold text-stone-800 mb-2">智能药盒 App · 交互原型</h1>
          <p className="text-sm text-stone-500 mb-6">点击页面内按钮可切换不同页面</p>
          <div className="flex gap-2 mb-6">
            <button onClick={() => setActiveTab("elderly")} className={`px-6 py-2 rounded-full font-bold text-sm cursor-pointer transition ${activeTab === "elderly" ? "bg-amber2-500 text-white shadow-lg" : "bg-cream-50 text-stone-600 shadow hover:shadow-md"}`}>老人端</button>
            <button onClick={() => setActiveTab("child")} className={`px-6 py-2 rounded-full font-bold text-sm cursor-pointer transition ${activeTab === "child" ? "bg-amber2-500 text-white shadow-lg" : "bg-cream-50 text-stone-600 shadow hover:shadow-md"}`}>子女端</button>
          </div>
          <div className="w-[375px] h-[760px] bg-cream-50 rounded-[3rem] shadow-2xl border-8 border-stone-800 overflow-hidden relative">
            <div className="h-11 bg-stone-800 flex items-center justify-center">
              <div className="w-20 h-5 bg-stone-900 rounded-full"></div>
            </div>
            <div className="h-[calc(100%-2.75rem)] overflow-hidden">
              {activeTab === "elderly" ? <ElderlyApp /> : <ChildApp />}
            </div>
          </div>
          <div className="mt-6 text-xs text-stone-400">智能药盒 MVP · 产品交互原型 · 2026.06</div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<SmartPillboxPrototype />);
  </script>
</body>
</html>
